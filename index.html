<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pop-up Book 3D – Drama Kelas XI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #1a1210; font-family: 'EB Garamond', serif; color: #fff; }
      #app { width: 100vw; height: 100vh; }

      /* Loading screen */
      #loading {
        position: fixed; inset: 0; background: #1a1210;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 100; transition: opacity 0.5s ease;
      }
      #loading h2 { font-family: 'Cinzel', serif; font-size: 28px; color: #E8C9A0; letter-spacing: 2px; }

      .link-list { display: flex; flex-direction: column; gap: 10px; }
      .link-item {
        display: flex; align-items: center; gap: 8px;
        padding: 11px 14px; border-radius: 10px;
        background: rgba(200, 149, 107, 0.12);
        border: 1px solid rgba(200, 149, 107, 0.25);
        color: #D32F2F; text-decoration: none;
        font-size: 14px; transition: background 0.2s, border-color 0.2s;
      }
      .link-item:hover { background: rgba(200, 149, 107, 0.25); border-color: rgba(200, 149, 107, 0.5); }

      audio { width: 100%; margin-top: 14px; border-radius: 8px; }

      /* Text overlay (scrollable) */
      #text-overlay {
        position: fixed; inset: 0;
        z-index: 50;
        display: flex; align-items: center; justify-content: center;
        background: rgba(10, 5, 2, 0.7);
        backdrop-filter: blur(8px);
        opacity: 0; pointer-events: none;
        transition: opacity 0.35s ease;
      }
      #text-overlay.active { opacity: 1; pointer-events: auto; }

      .overlay-card {
        width: 500px; max-width: 90vw; max-height: 75vh;
        background: #FFF9F0;
        border: 3px solid #C8956B;
        border-radius: 20px;
        padding: 36px 32px;
        overflow-y: auto;
        color: #2c2520;
        transform: translateY(30px) scale(0.95);
        transition: transform 0.35s ease;
        scrollbar-width: thin;
        scrollbar-color: #C8956B transparent;
      }
      #text-overlay.active .overlay-card {
        transform: translateY(0) scale(1);
      }
      .overlay-card h2 {
        font-family: 'Cinzel', serif;
        font-size: 26px; color: #8B2500;
        margin-bottom: 12px; text-align: center;
      }
      .overlay-card .divider {
        height: 2px; background: #C8956B;
        margin: 8px 0 18px; border-radius: 1px;
      }
      .overlay-card p {
        font-size: 18px; line-height: 1.75;
        white-space: pre-wrap;
      }
      #overlay-media { display: none; }
      .overlay-close {
        display: block; margin: 24px auto 0;
        padding: 10px 32px; border-radius: 50px;
        background: #8B2500; border: none;
        color: #FFF9F0; font-family: 'Cinzel', serif;
        font-size: 14px; letter-spacing: 1px;
        cursor: pointer; transition: background 0.2s;
      }
      .overlay-close:hover { background: #a83200; }

      /* Navigation */
      .nav-bar {
        position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
        display: flex; gap: 16px; align-items: center;
        z-index: 10;
      }
      .nav-btn {
        padding: 12px 28px; border-radius: 50px;
        background: rgba(200, 149, 107, 0.15);
        border: 1px solid rgba(200, 149, 107, 0.4);
        color: #f0d9bc; font-family: 'Cinzel', serif;
        font-size: 13px; letter-spacing: 1px;
        cursor: pointer; transition: all 0.2s ease;
        backdrop-filter: blur(10px);
      }
      .nav-btn:hover { background: rgba(200, 149, 107, 0.3); }
      .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

      /* ─── Responsive: Tablets ─── */
      @media (max-width: 768px) {
        .nav-bar { bottom: 16px; gap: 8px; }
        .nav-btn { padding: 10px 16px; font-size: 11px; }
        .overlay-card {
          max-width: 95vw; max-height: 85vh;
          padding: 24px 18px;
        }
        .overlay-card h2 { font-size: 20px; }
        .overlay-card p { font-size: 15px; }
        .link-item { font-size: 13px; padding: 9px 12px; }
        .overlay-close { padding: 8px 24px; font-size: 12px; }
        #loading h2 { font-size: 20px; }
      }

      /* ─── Responsive: Mobile Phones ─── */
      @media (max-width: 480px) {
        .nav-bar { bottom: 10px; gap: 6px; width: 95vw; justify-content: center; }
        .nav-btn { padding: 8px 12px; font-size: 10px; letter-spacing: 0; }
        .overlay-card {
          max-width: 98vw; max-height: 90vh;
          padding: 18px 14px; border-radius: 14px;
        }
        .overlay-card h2 { font-size: 18px; margin-bottom: 8px; }
        .overlay-card p { font-size: 14px; line-height: 1.6; }
        .link-item { font-size: 12px; padding: 8px 10px; }
        #loading h2 { font-size: 16px; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="loading">
      <h2>Membuka Buku...</h2>
    </div>

    <div id="text-overlay">
      <div class="overlay-card">
        <h2 id="overlay-title"></h2>
        <div class="divider"></div>
        <p id="overlay-text"></p>
        <div id="overlay-media"></div>
        <button class="overlay-close" id="overlay-close">Tutup</button>
      </div>
    </div>

    <div class="nav-bar">
      <button id="prev-btn" class="nav-btn" style="display:none" disabled>← Sebelumnya</button>
      <button id="open-btn" class="nav-btn">📖 Buka Buku</button>
      <button id="page-audio-btn" class="nav-btn" style="display:none; background: rgba(220, 50, 50, 0.25); border-color: rgba(220, 50, 50, 0.5);">🔊 Putar Audio Halaman</button>
      <audio id="page-audio-player" style="display:none;"></audio>
      <button id="next-btn" class="nav-btn" style="display:none">Berikutnya →</button>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
